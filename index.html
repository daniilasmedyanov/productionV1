      ${hasWear      ? `<th style="width:110px">Физ. износ</th>` : ''}
      ${hasMoralWear ? `<th style="width:110px">Мор. износ</th>` : ''}
      ${hasMdf1 ? `<th style="width:110px">Склейка МДФ</th>` : ''}
      ${hasMdf2 ? `<th style="width:110px">Матрица МДФ</th>` : ''}
      ${hasKD  ? `<th class="center">КД</th>` : ''}
      ${hasSub ? `<th>Субподряд</th>` : ''}
      ${units.map(() => `<th class="center">дата</th>`).join('')}
    </tr>`;
  }

  // Датные колонки фиксированы в px, операция берёт остаток
  const DATE_COL_W = 88; // px — минимально читаемая ширина
  const dateColCount = se ? units.length * 4 : pf ? units.length * 2 : units.length;

  let colgroup = `<colgroup>
    ${hasNum ? `<col style="width:34px">` : ''}
    <col style="min-width:280px">

    ${hasPost ? `<col style="width:150px">` : ''}
    ${hasWear      ? `<col style="width:110px">` : ''}
    ${hasMoralWear ? `<col style="width:110px">` : ''}
    ${hasMdf1 ? `<col style="width:110px">` : ''}
    ${hasMdf2 ? `<col style="width:110px">` : ''}
    ${hasKD   ? `<col style="width:82px">` : ''}
    ${hasSub  ? `<col style="width:132px">` : ''}`;
  for (let i = 0; i < dateColCount; i++) {
    colgroup += `<col style="width:${DATE_COL_W}px">`;
  }
  colgroup += `</colgroup>`;

  html += `<div class="detail-table-wrap"><table class="detail-table" style="table-layout:fixed;width:100%">
    ${colgroup}
    <thead>${thead}</thead>
    <tbody>`;

  // Хелпер: строки дат для строки операции
  function opDateCells(row) {
    const sr = row.sourceRow || '';
    const mode = window.EDIT_MODE || 'plan'; // 'plan' (директор) или 'fact' (мастер)
    const planCell = (field, val) =>
      mode === 'plan'
        ? `class="col-date plan-cell" data-sheet="${esc(sheetName)}" data-row="${sr}" data-unit="UNIT" data-field="${field}" data-current="${esc(val||'')}" ondblclick="startPlanEdit(this)" title="Двойной клик — изменить план"`
        : `class="col-date"`;
    const factCell = (field, val) =>
      mode === 'fact'
        ? `class="col-date fact-cell" data-sheet="${esc(sheetName)}" data-row="${sr}" data-unit="UNIT" data-field="${field}" data-current="${esc(val||'')}" ondblclick="startFactEdit(this)" title="Двойной клик — отметить факт"`
        : `class="col-date"`;
    return se
      ? units.map(u => {
          const d=(row.dates&&row.dates[u])||{};
          const dev = d.deviation;
          const devHtml = dev !== null && dev !== undefined
            ? `<span style="font-size:10px;margin-left:3px;color:${dev>0?'var(--red)':dev<0?'var(--green)':'var(--text-hint)'}">${dev>0?'+':''}${dev}д</span>` : '';
          return `<td ${planCell('startPlan', d.startPlan).replace('UNIT', esc(u))} style="border-left:1.5px solid var(--border-med)">${renderPlanBadge(d.startPlan||'')}</td>
                  <td ${factCell('startFact', d.startFact).replace('UNIT', esc(u))}>${renderFactBadge(d.startFact||'',d.startPlan||'')}</td>
                  <td ${planCell('endPlan', d.endPlan).replace('UNIT', esc(u))}>${renderPlanBadge(d.endPlan||'')}</td>
                  <td ${factCell('endFact', d.endFact).replace('UNIT', esc(u))}>${renderFactBadge(d.endFact||'',d.endPlan||'')}${devHtml}</td>`;
        }).join('')
      : pf
      ? units.map(u => {
          const d=(row.dates&&row.dates[u])||{};
          return `<td ${planCell('plan', d.plan).replace('UNIT', esc(u))} style="border-left:1.5px solid var(--border-med)">${renderPlanBadge(d.plan||'')}</td>
                  <td ${factCell('fact', d.fact).replace('UNIT', esc(u))}>${renderFactBadge(d.fact||'',d.plan||'')}</td>`;
        }).join('')
      : units.map(u=>`<td class="col-date">${renderDateBadge((row.dates&&row.dates[u])||'')}</td>`).join('');
  }

  // Хелпер: строки дат для агрегированной группы
  function aggDateCells(agg) {
    return se
      ? units.map(u => {
          const d=agg.dates[u]||{};
          const dev = d.deviation;
          const devHtml = dev !== null && dev !== undefined
            ? `<span style="font-size:10px;margin-left:3px;color:${dev>0?'var(--red)':dev<0?'var(--green)':'var(--text-hint)'}">${dev>0?'+':''}${dev}д</span>` : '';
          return `<td class="col-date" style="border-left:1.5px solid var(--border-med)">${renderPlanBadge(d.startPlan||'')}</td>
                  <td class="col-date">${renderFactBadge(d.startFact||'',d.startPlan||'')}</td>
                  <td class="col-date">${renderPlanBadge(d.endPlan||'')}</td>
                  <td class="col-date">${renderFactBadge(d.endFact||'',d.endPlan||'')}${devHtml}</td>`;
        }).join('')
      : pf
      ? units.map(u => {
          const d=agg.dates[u]||{};
          return `<td class="col-date" style="border-left:1.5px solid var(--border-med)">${renderPlanBadge(d.plan||'')}</td>
                  <td class="col-date">${renderFactBadge(d.fact||'',d.plan||'')}</td>`;
        }).join('')
      : units.map(u=>`<td class="col-date">${renderDateBadge(agg.dates[u]||'')}</td>`).join('');
  }

  let rowIdx = 0; // глобальный счётчик для уникальных gid

  groups.forEach((group) => {
    const gid = `g_${rowIdx++}`;

    if (groupMode === 'post') {
      // ── Уровень 1: строка поста ──────────────────────────────
      const postAgg = aggregateGroup(group.rows);
      html += `<tr class="group-header-row" onclick="toggleGroup('${gid}', event)" style="cursor:pointer;background:#e8eaf6">
        ${hasNum ? `<td class="col-num"></td>` : ''}
        <td style="font-weight:700;font-size:13px;padding:9px 12px;color:#3730a3">
          <span id="toggle_${gid}" style="display:inline-block;width:14px;margin-right:6px;color:#3730a3;font-size:11px;transition:transform .2s">▶</span>
          📍 ${esc(displayPost(group.name))}
          <span style="font-size:11px;color:var(--text-hint);margin-left:6px;font-weight:400">${group.rows.length} оп.</span>
        </td>
        ${hasPost      ? `<td class="col-post"></td>` : ''}
        ${hasWear      ? `<td class="col-wear"></td>` : ''}
        ${hasMoralWear ? `<td class="col-wear"></td>` : ''}
        ${hasMdf1      ? `<td class="col-wear"></td>` : ''}
        ${hasMdf2      ? `<td class="col-wear"></td>` : ''}
        ${hasKD  ? `<td class="col-kd">${renderKdBadge(postAgg.kd)}</td>` : ''}
        ${hasSub ? `<td class="col-sub" style="font-size:11px;color:var(--text-sec)">${esc(postAgg.sub)}</td>` : ''}
        ${aggDateCells(postAgg)}
      </tr>`;

      // Внутри поста — группируем по узлу
      const nodeMap = new Map();
      const nodeOrder = [];
      group.rows.forEach(row => {
        const g = row.group || '—';
        if (!nodeMap.has(g)) { nodeMap.set(g, { num: row.num||'', name: g, rows:[] }); nodeOrder.push(g); }
        nodeMap.get(g).rows.push(row);
      });

      nodeOrder.forEach(nodeName => {
        const nodeGroup = nodeMap.get(nodeName);
        const nodeGid = `g_${rowIdx++}`;
        const nodeAgg = aggregateGroup(nodeGroup.rows);

        // Если все строки flat (нет группы) — показываем без заголовка узла
        const allFlat = nodeGroup.rows.every(r => r.flat);
        if (allFlat || nodeName === '—') {
          nodeGroup.rows.forEach(row => {
            html += `<tr class="op-row op-child" data-group="${gid}" style="display:none">
              ${hasNum ? `<td class="col-num"></td>` : ''}
              <td class="col-op" style="padding-left:28px;color:var(--text-sec)">${esc(row.label||'')}</td>
              ${hasPost      ? `<td class="col-post"></td>` : ''}
              ${hasWear      ? `<td class="col-wear">${renderWearBadge(row.wear||'',false)}</td>` : ''}
              ${hasMoralWear ? `<td class="col-wear">${renderWearBadge(row.moralWear||'',true)}</td>` : ''}
              ${hasMdf1      ? `<td class="col-wear">${renderMdfBadge(row.mdf1||'')}</td>` : ''}
              ${hasMdf2      ? `<td class="col-wear">${renderMdfBadge(row.mdf2||'')}</td>` : ''}
              ${hasKD  ? `<td class="col-kd">${renderKdBadge(row.kd||'')}</td>` : ''}
              ${hasSub ? `<td class="col-sub">${renderSubBadge(row.sub||'')}</td>` : ''}
              ${opDateCells(row)}
            </tr>`;
          });
          return;
        }

        // ── Уровень 2: строка узла (дочерняя поста) ────────────
        html += `<tr class="group-header-row" data-group="${gid}" data-level="node" onclick="toggleGroup('${nodeGid}', event)" style="display:none;cursor:pointer">
          ${hasNum ? `<td class="col-num"></td>` : ''}
          <td style="font-weight:500;font-size:12.5px;padding:8px 12px 8px 28px">
            <span id="toggle_${nodeGid}" style="display:inline-block;width:14px;margin-right:6px;color:var(--text-hint);font-size:11px;transition:transform .2s">▶</span>
            ${esc(nodeName)}
            <span style="font-size:11px;color:var(--text-hint);margin-left:6px">${nodeGroup.rows.length} оп.</span>
          </td>
          ${hasPost      ? `<td class="col-post"></td>` : ''}
          ${hasWear      ? `<td class="col-wear"></td>` : ''}
          ${hasMoralWear ? `<td class="col-wear"></td>` : ''}
          ${hasMdf1      ? `<td class="col-wear"></td>` : ''}
          ${hasMdf2      ? `<td class="col-wear"></td>` : ''}
          ${hasKD  ? `<td class="col-kd">${renderKdBadge(nodeAgg.kd)}</td>` : ''}
          ${hasSub ? `<td class="col-sub" style="font-size:11px;color:var(--text-sec)">${esc(nodeAgg.sub)}</td>` : ''}
          ${aggDateCells(nodeAgg)}
        </tr>`;

        // ── Уровень 3: операции ─────────────────────────────────
        nodeGroup.rows.forEach(row => {
          html += `<tr class="op-row op-child" data-group="${nodeGid}" data-level="op" style="display:none">
            ${hasNum ? `<td class="col-num"></td>` : ''}
            <td class="col-op" style="padding-left:44px;color:var(--text-sec)">${esc(row.label||'')}</td>
            ${hasPost      ? `<td class="col-post"></td>` : ''}
            ${hasWear      ? `<td class="col-wear">${renderWearBadge(row.wear||'',false)}</td>` : ''}
            ${hasMoralWear ? `<td class="col-wear">${renderWearBadge(row.moralWear||'',true)}</td>` : ''}
            ${hasMdf1      ? `<td class="col-wear">${renderMdfBadge(row.mdf1||'')}</td>` : ''}
            ${hasMdf2      ? `<td class="col-wear">${renderMdfBadge(row.mdf2||'')}</td>` : ''}
            ${hasKD  ? `<td class="col-kd">${renderKdBadge(row.kd||'')}</td>` : ''}
            ${hasSub ? `<td class="col-sub">${renderSubBadge(row.sub||'')}</td>` : ''}
            ${opDateCells(row)}
          </tr>`;
        });
      });

    } else if (group.flat) {
      // ── Flat строка — без группировки, на верхнем уровне ────
      const row = group.rows[0];
      html += `<tr class="op-row">
        ${hasNum ? `<td class="col-num" style="color:var(--text-hint)">${esc(row.num||'')}</td>` : ''}
        <td class="col-op" style="color:var(--text)">${esc(row.label||'')}</td>
        ${hasPost ? `<td class="col-post"><span class="badge-post">${esc(row.post||'')}</span></td>` : ''}
        ${hasWear      ? `<td class="col-wear">${renderWearBadge(row.wear||'',false)}</td>` : ''}
        ${hasMoralWear ? `<td class="col-wear">${renderWearBadge(row.moralWear||'',true)}</td>` : ''}
        ${hasMdf1      ? `<td class="col-wear">${renderMdfBadge(row.mdf1||'')}</td>` : ''}
        ${hasMdf2      ? `<td class="col-wear">${renderMdfBadge(row.mdf2||'')}</td>` : ''}
        ${hasKD  ? `<td class="col-kd">${renderKdBadge(row.kd||'')}</td>` : ''}
        ${hasSub ? `<td class="col-sub">${renderSubBadge(row.sub||'')}</td>` : ''}
        ${opDateCells(row)}
      </tr>`;

    } else {
      // ── Режим "по узлам" — как раньше ───────────────────────
      const agg = aggregateGroup(group.rows);
      html += `<tr class="group-header-row" onclick="toggleGroup('${gid}', event)" style="cursor:pointer">
        ${hasNum ? `<td class="col-num"></td>` : ''}
        <td style="font-weight:500;font-size:13px;padding:9px 12px">
          <span id="toggle_${gid}" style="display:inline-block;width:14px;margin-right:6px;color:var(--text-hint);font-size:11px;transition:transform .2s">▶</span>
          ${esc(displayPost(group.name))}
          <span style="font-size:11px;color:var(--text-hint);margin-left:6px">${group.rows.length} оп.</span>
        </td>
        ${hasPost ? `<td class="col-post"></td>` : ''}
        ${hasWear      ? `<td class="col-wear"></td>` : ''}
        ${hasMoralWear ? `<td class="col-wear"></td>` : ''}
        ${hasMdf1      ? `<td class="col-wear"></td>` : ''}
        ${hasMdf2      ? `<td class="col-wear"></td>` : ''}
        ${hasKD  ? `<td class="col-kd">${renderKdBadge(agg.kd)}</td>` : ''}
        ${hasSub ? `<td class="col-sub" style="font-size:11px;color:var(--text-sec)">${esc(agg.sub)}</td>` : ''}
        ${aggDateCells(agg)}
      </tr>`;

      group.rows.forEach(row => {
        html += `<tr class="op-row op-child" data-group="${gid}" style="display:none">
          ${hasNum ? `<td class="col-num"></td>` : ''}
          <td class="col-op" style="padding-left:32px;color:var(--text-sec)">${esc(row.label||'')}</td>
          ${hasPost ? `<td class="col-post"><span class="badge-post">${esc(row.post||'')}</span></td>` : ''}
          ${hasWear      ? `<td class="col-wear">${renderWearBadge(row.wear||'',false)}</td>` : ''}
          ${hasMoralWear ? `<td class="col-wear">${renderWearBadge(row.moralWear||'',true)}</td>` : ''}
          ${hasMdf1      ? `<td class="col-wear">${renderMdfBadge(row.mdf1||'')}</td>` : ''}
          ${hasMdf2      ? `<td class="col-wear">${renderMdfBadge(row.mdf2||'')}</td>` : ''}
          ${hasKD  ? `<td class="col-kd">${renderKdBadge(row.kd||'')}</td>` : ''}
          ${hasSub ? `<td class="col-sub">${renderSubBadge(row.sub||'')}</td>` : ''}
          ${opDateCells(row)}
        </tr>`;
      });
    }
  });

  html += `</tbody></table></div></div>`;
  return html;
}

let _toggleLock = {};
function toggleGroup(gid, ev) {
  // Гасим всплытие чтобы клик не обработался дважды (span внутри строки)
  if (ev) { ev.stopPropagation(); }

  const toggle = document.getElementById(`toggle_${gid}`);
  // Состояние читаем из РЕАЛЬНОГО DOM — видна ли первая дочерняя строка
  const childRows = document.querySelectorAll(`tr[data-group="${gid}"]`);
  if (!childRows.length) return;
  const isOpen = childRows[0].style.display !== 'none';

  if (isOpen) {
    // Закрываем рекурсивно
    const visited = new Set();
    function closeGroup(g) {
      if (visited.has(g)) return;
      visited.add(g);
      document.querySelectorAll(`tr[data-group="${g}"]`).forEach(r => {
        r.style.display = 'none';
        const childToggle = r.querySelector('[id^="toggle_"]');
        if (childToggle) {
          const childGid = childToggle.id.replace('toggle_', '');
          childToggle.style.transform = '';
          closeGroup(childGid);
        }
      });
    }
    closeGroup(gid);
    if (toggle) toggle.style.transform = '';
  } else {
    // Открываем — показываем прямых детей
    childRows.forEach(r => { r.style.display = ''; });
    if (toggle) toggle.style.transform = 'rotate(90deg)';
  }
}

function renderDateBadge(v) {
  if (!v) return `<span class="badge-empty"></span>`;
  if (v === '+') return `<span class="badge-fact">✓</span>`;
  if (v.match(/нет в комплект/i)) return `<span class="badge-nc">не вкл.</span>`;
  if (v.match(/^\d{1,2}[.\/\-]\d|май|июн|июл|авг|сен|окт|ноя|дек|янв|фев|мар|апр/i)) return `<span class="badge-plan">${v}</span>`;
  return `<span class="badge-fact">${v}</span>`;
}
function renderPlanBadge(v) {
  if (!v) return `<span class="badge-empty"></span>`;
  if (v.match(/нет в комплект/i)) return `<span class="badge-nc">не вкл.</span>`;
  return `<span class="badge-plan">${v}</span>`;
}
function renderFactBadge(v, planV) {
  if (!v) return planV
    ? `<span style="display:inline-block;width:14px;height:2px;background:#d1d5db;border-radius:2px;vertical-align:middle"></span>`
    : `<span class="badge-empty"></span>`;
  if (v === '+') return `<span class="badge-fact">✓</span>`;
  return `<span class="badge-fact">${v}</span>`;
}
function renderKdBadge(v) {
  if (!v) return `<span class="badge-empty"></span>`;
  if (v === '+') return `<span class="badge-kd">✓</span>`;
  if (v.match(/нет в комплект/i)) return `<span class="badge-nc">не вкл.</span>`;
  if (v.match(/май|июн|июл|авг|сен|окт|ноя|дек|янв|фев|мар|апр|\d{1,2}[./]/i)) return `<span class="badge-plan">${v}</span>`;
  return `<span style="font-size:11px;color:var(--text-sec)">${v}</span>`;
}
function renderSubBadge(v) {
  if (!v) return '';
  return `<span class="badge-sub">${v}</span>`;
}
function renderWearBadge(v, moral) {
  if (!v) return `<span class="badge-empty"></span>`;
  return `<span class="badge-wear${moral?' moral':''}" title="${esc(v)}">${esc(v)}</span>`;
}
function renderMdfBadge(v) {
  if (!v) return `<span class="badge-empty"></span>`;
  return `<span class="badge-mdf" title="${esc(v)}">${esc(v)}</span>`;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// Подмена названий постов только для отображения. В Sheets — как есть.
function displayPost(s) {
  if (!s) return s;
  const map = {
    'Пост кузовной сборки': 'Для поста кузовной сборки',
  };
  return map[String(s).trim()] || s;
}

// ─────────────────────────────────────────────────────────────
// INLINE-РЕДАКТИРОВАНИЕ ФАКТА В DETAIL-ТАБЛИЦАХ
// Двойной клик по ячейке факта → input → сохранение через GAS
// ─────────────────────────────────────────────────────────────

let inlineEditActive = false;
const lastUndo = { snapshot: null }; // для кнопки "Отменить" в toast

function startPlanEdit(td) { startDateEdit(td, 'plan'); }
function startFactEdit(td) { startDateEdit(td, 'fact'); }

function startDateEdit(td, mode) {
  if (inlineEditActive) return;
  if (!td.dataset.row) {
    showToast('Эту ячейку нельзя редактировать (нет привязки к строке)', 'error');
    return;
  }
  inlineEditActive = true;

  const sheet   = td.dataset.sheet;
  const rowNum  = +td.dataset.row;
  const unit    = td.dataset.unit;
  const field   = td.dataset.field;
  const current = td.dataset.current || '';
  const isPlan  = mode === 'plan';
  const accent  = isPlan ? 'var(--blue)' : 'var(--green)';

  // Запоминаем какой месяц показать первым: текущее значение или сегодня
  const initialDate = parsePlanDate(current) || new Date();
  let viewYear  = initialDate.getFullYear();
  let viewMonth = initialDate.getMonth(); // 0-11

  // Подсветка ячейки чтобы было видно что редактируется
  td.style.outline = '2px solid ' + accent;
  td.style.outlineOffset = '-2px';

  // Создаём попап
  const popup = document.createElement('div');
  popup.id = 'date-popup';
  popup.className = 'date-popup';

  // Закрытие
  const close = () => {
    inlineEditActive = false;
    td.style.outline = '';
    td.style.outlineOffset = '';
    popup.remove();
    document.removeEventListener('mousedown', onOutsideClick, true);
    document.removeEventListener('keydown', onEsc);
  };

  const onOutsideClick = (e) => {
    if (!popup.contains(e.target) && e.target !== td && !td.contains(e.target)) close();
  };
  const onEsc = (e) => { if (e.key === 'Escape') close(); };

  // Сохранение значения и закрытие попапа
  const pickDate = async (rusDate) => {
    if (rusDate === current) { close(); return; }
    td.innerHTML = `<span style="font-size:10px;color:var(--text-hint)">сохраняю...</span>`;
    close();
    const ok = isPlan
      ? await savePlanValue(sheet, rowNum, unit, field, rusDate)
      : await saveFactValue(sheet, rowNum, unit, field, rusDate);
    if (ok) {
      lastUndo.snapshot = { sheet, rowNum, unit, field, oldRus: current, newRus: rusDate, isPlan };
      td.dataset.current = rusDate;
      td.innerHTML = isPlan ? renderPlanBadge(rusDate) : renderFactBadge(rusDate, '');
      markStale();
      showToast(`✓ ${isPlan?'План':'Факт'} сохранён: ${rusDate || '(пусто)'}`, 'ok', () => undoLastSave(td));
    } else {
      td.dataset.current = current;
      td.innerHTML = isPlan ? renderPlanBadge(current) : renderFactBadge(current, '');
    }
  };

  // Рендер месяца
  const renderMonth = () => {
    const monthNames = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const dayNames = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

    // Какой день недели первого числа (0=Sun, делаем 0=Mon)
    const first = new Date(viewYear, viewMonth, 1);
    let firstDow = first.getDay() - 1;
    if (firstDow < 0) firstDow = 6;
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const daysPrev    = new Date(viewYear, viewMonth, 0).getDate();

    const today = new Date(); today.setHours(0,0,0,0);
    const cur   = parsePlanDate(current);

    let cells = '';
    let dayIdx = 0;
    for (let row = 0; row < 6; row++) {
      for (let col = 0; col < 7; col++) {
        let d, m, y, dim = false;
        if (dayIdx < firstDow) {
          d = daysPrev - firstDow + dayIdx + 1; m = viewMonth - 1; y = viewYear; dim = true;
        } else if (dayIdx - firstDow >= daysInMonth) {
          d = dayIdx - firstDow - daysInMonth + 1; m = viewMonth + 1; y = viewYear; dim = true;
        } else {
          d = dayIdx - firstDow + 1; m = viewMonth; y = viewYear;
        }
        // Нормализация
        const cellDate = new Date(y, m, d);
        const isToday   = cellDate.getTime() === today.getTime();
        const isCurrent = cur && cellDate.getTime() === cur.setHours(0,0,0,0);
        const isWeekend = col >= 5;
        let cls = 'dp-cell';
        if (dim)       cls += ' dim';
        if (isToday)   cls += ' today';
        if (isCurrent) cls += ' current';
        if (isWeekend && !dim) cls += ' weekend';
        const rusStr = fmtPlanDate(cellDate);
        cells += `<button class="${cls}" data-rus="${rusStr}">${d}</button>`;
        dayIdx++;
      }
    }

    popup.innerHTML = `
      <div class="dp-header">
        <button class="dp-nav" data-step="-12" title="−1 год">«</button>
        <button class="dp-nav" data-step="-1" title="−1 месяц">‹</button>
        <div class="dp-title">${monthNames[viewMonth]} ${viewYear}</div>
        <button class="dp-nav" data-step="1" title="+1 месяц">›</button>
        <button class="dp-nav" data-step="12" title="+1 год">»</button>
      </div>
      <div class="dp-dows">${dayNames.map(n=>`<div class="dp-dow">${n}</div>`).join('')}</div>
      <div class="dp-grid">${cells}</div>
      <div class="dp-footer">
        <button class="dp-action dp-today">Сегодня</button>
        ${current ? `<button class="dp-action dp-clear">Очистить</button>` : ''}
        <button class="dp-action dp-cancel">Отмена</button>
      </div>
    `;

    // Навешиваем хэндлеры
    popup.querySelectorAll('.dp-nav').forEach(b => b.onclick = () => {
      const step = +b.dataset.step;
      viewMonth += step;
      while (viewMonth < 0)  { viewMonth += 12; viewYear--; }
      while (viewMonth > 11) { viewMonth -= 12; viewYear++; }
      renderMonth();
    });
    popup.querySelectorAll('.dp-cell').forEach(b => b.onclick = () => pickDate(b.dataset.rus));
    popup.querySelector('.dp-today').onclick = () => pickDate(fmtPlanDate(new Date()));
    const clearBtn = popup.querySelector('.dp-clear');
    if (clearBtn) clearBtn.onclick = () => pickDate('');
    popup.querySelector('.dp-cancel').onclick = close;
  };

  document.body.appendChild(popup);
  renderMonth();

  // Позиционирование под ячейкой (или над, если внизу не хватает места)
  const rect = td.getBoundingClientRect();
  const popupRect = popup.getBoundingClientRect();
  let top  = rect.bottom + 4;
  let left = rect.left + rect.width / 2 - popupRect.width / 2;
  if (top + popupRect.height > window.innerHeight - 8) {
    top = rect.top - popupRect.height - 4;
  }
  if (left < 8) left = 8;
  if (left + popupRect.width > window.innerWidth - 8) left = window.innerWidth - popupRect.width - 8;
  popup.style.top  = top + 'px';
  popup.style.left = left + 'px';

  // Закрытие по клику вне и Esc
  setTimeout(() => {
    document.addEventListener('mousedown', onOutsideClick, true);
    document.addEventListener('keydown', onEsc);
  }, 50);
}

// Отдельный хелпер для сохранения факта (используется в startInlineEdit и undoLastSave)
async function saveFactValue(sheet, rowNum, unit, field, rusValue) {
  const payload = { action:'saveFact', sheet, unit, updates:[{ row: rowNum }] };
  if (field === 'startFact') payload.updates[0].startFact = rusValue;
  else if (field === 'endFact') payload.updates[0].endFact = rusValue;
  else if (field === 'fact')   { payload.updates[0].startFact = rusValue; payload.updates[0].endFact = rusValue; }
  try {
    const r = await fetch(GAS, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
    });
    const result = await r.json();
    if (result.error) {
      showToast('Ошибка: ' + result.error, 'error');
      return false;
    }
    // НЕ сбрасываем кэш — только помечаем что сводка/гант устарели.
    // Пользователь обновит вручную кнопкой «Обновить».
    markStale();
    return true;
  } catch(e) {
    showToast('Сетевая ошибка: ' + e.message, 'error');
    return false;
  }
}

// Сохранение плана inline (без PIN)
async function savePlanValue(sheet, rowNum, unit, field, rusValue) {
  const payload = { action:'savePlan', sheet, unit, updates:[{ row: rowNum }] };
  if (field === 'startPlan') payload.updates[0].startPlan = rusValue;
  else if (field === 'endPlan') payload.updates[0].endPlan = rusValue;
  else if (field === 'plan')   { payload.updates[0].startPlan = rusValue; payload.updates[0].endPlan = rusValue; }
  try {
    const r = await fetch(GAS, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
    });
    const result = await r.json();
    if (result.error) {
      showToast('Ошибка: ' + result.error, 'error');
      return false;
    }
    markStale();
    return true;
  } catch(e) {
    showToast('Сетевая ошибка: ' + e.message, 'error');
    return false;
  }
}

async function undoLastSave(td) {
  if (!lastUndo.snapshot) return;
  const s = lastUndo.snapshot;
  const ok = s.isPlan
    ? await savePlanValue(s.sheet, s.rowNum, s.unit, s.field, s.oldRus)
    : await saveFactValue(s.sheet, s.rowNum, s.unit, s.field, s.oldRus);
  if (!ok) return;
  if (td) {
    td.dataset.current = s.oldRus;
    td.innerHTML = s.isPlan ? renderPlanBadge(s.oldRus) : renderFactBadge(s.oldRus, '');
  }
  showToast('↩ Отменено', 'ok');
  lastUndo.snapshot = null;
}

// Toast снизу справа. type: 'ok' | 'error'. onUndo — опциональный callback на «Отменить»
let toastTimer = null;
function showToast(message, type='ok', onUndo=null) {
  let toast = document.getElementById('inline-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'inline-toast';
    toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,0.3);z-index:10000;display:flex;align-items:center;gap:14px;max-width:400px;transition:transform .2s,opacity .2s;transform:translateY(20px);opacity:0';
    document.body.appendChild(toast);
  }
  const bg = type === 'error' ? '#991b1b' : '#1a1a1a';
  toast.style.background = bg;
  toast.innerHTML = `<span>${esc(message)}</span>`;
  if (onUndo) {
    const btn = document.createElement('button');
    btn.textContent = 'Отменить';
    btn.style.cssText = 'background:transparent;color:#93c5fd;border:none;cursor:pointer;font-size:12px;font-weight:500;text-decoration:underline;padding:0';
    btn.onclick = () => { hideToast(); onUndo(); };
    toast.appendChild(btn);
  }
  requestAnimationFrame(() => {
    toast.style.transform = 'translateY(0)';
    toast.style.opacity = '1';
  });
  clearTimeout(toastTimer);
  toastTimer = setTimeout(hideToast, onUndo ? 5000 : 2500);
}
function hideToast() {
  const toast = document.getElementById('inline-toast');
  if (!toast) return;
  toast.style.transform = 'translateY(20px)';
  toast.style.opacity = '0';
}

async function loadPlanRows() {
  const sheets = PLAN_AREAS[planState.area];
  const sheet  = sheets && sheets[planState.proj];
  const wrap   = document.getElementById('plan-table-wrap');

  if (!sheet) {
    wrap.innerHTML = `<div class="state-msg">Для ${planState.proj.toUpperCase()} нет листа на участке "${planState.area}"</div>`;
    planState.rows = [];
    updatePlanDirtyInfo();
    return;
  }

  // Всегда грузим свежие данные — игнорируем кэш
  wrap.innerHTML = `<div class="big-loading"><span class="loader"></span><div class="big-loading-text">Загружаем ${sheet}</div></div>`;
  let detail;
  try {
    const r = await fetch(GAS + '?action=detail&sheet=' + encodeURIComponent(sheet) + '&_=' + Date.now());
    detail = await r.json();
    detailCache[sheet] = detail;
  } catch(e) {
    wrap.innerHTML = `<div class="state-msg">Ошибка загрузки: ${e.message}</div>`;
    return;
  }

  if (!detail.hasStartEnd) {
    wrap.innerHTML = `<div class="state-msg">Лист "${sheet}" не поддерживает план-старт/план-конец</div>`;
    planState.rows = [];
    updatePlanDirtyInfo();
    return;
  }

  const indicator = document.getElementById('plan-current-sheet');
  if (indicator) indicator.textContent = `📋 ${sheet} · ${detail.rows.length} оп.`;

  // Собираем строки для редактирования. Нужны row index из листа — но в detail у нас этого нет!
  // Соберём по порядку: первая операция = первая строка после dataStartRow, и т.д.
  // НО: detail.rows может содержать пропуски (пустые строки скипаются в buildDetail).
  // Поэтому нам нужно либо переделать buildDetail чтобы возвращал rowNum, либо собирать здесь.
  // ВРЕМЕННО: используем порядковый индекс — это сработает только если в листе нет пропусков.
  // Правильное решение — добавить rowNum в buildDetail (см. TODO ниже).

  // Получим конфиг с бэка — у нас он не приходит, поэтому используем хардкод dataStartRow
  // Лучше попросить бэк отдавать sourceRow в каждой строке.
  planState.rows = detail.rows.map((r, idx) => {
    const d = (r.dates && r.dates[planState.unit]) || {};
    return {
      idx,
      rowNum: r.sourceRow || null,  // нужен бэкенд-патч; пока попробуем sourceRow
      label: r.label || '',
      group: r.group || '',
      post:  r.post  || '',
      flat:  r.flat,
      startPlan: d.startPlan || '',
      endPlan:   d.endPlan   || '',
      duration:  calcDuration(d.startPlan, d.endPlan),
      origStart: d.startPlan || '',
      origEnd:   d.endPlan   || '',
      dirty: false,
    };
  });

  renderPlanTable();
  updatePlanDirtyInfo();
}

function calcDuration(start, end) {
  if (!start || !end) return null;
  const ds = parsePlanDate(start), de = parsePlanDate(end);
  if (!ds || !de) return null;
  return Math.round((de - ds) / 86400000);
}

function parsePlanDate(s) {
  if (!s) return null;
  const m = String(s).match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if (!m) return null;
  return new Date(+m[3], +m[2]-1, +m[1]);
}

function rusToIso(s) {
  const m = String(s||'').match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if (!m) return '';
  return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
}

function isoToRus(s) {
  const m = String(s||'').match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return '';
  return `${m[3]}.${m[2]}.${m[1]}`;
}

function fmtPlanDate(d) {
  if (!d) return '';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}.${mm}.${d.getFullYear()}`;
}

function renderPlanTable() {
  const rows = planState.rows;
  const wrap = document.getElementById('plan-table-wrap');
  if (!rows.length) {
    wrap.innerHTML = `<div class="state-msg">Нет операций</div>`;
    return;
  }

  // Группировка только по постам (узлы игнорируем — слишком детальная разбивка)
  const groupKey = r => r.post || r.group || '';

  // Соберём список уникальных групп с их строками (по уникальному имени, не по соседству)
  const groupMap = new Map();
  rows.forEach((r, i) => {
    const g = groupKey(r);
    if (!groupMap.has(g)) groupMap.set(g, { name: g, rows: [] });
    groupMap.get(g).rows.push({ ...r, _idx: i });
  });
  const groups = Array.from(groupMap.values());

  let html = `<div style="background:var(--surface);border:0.5px solid var(--border-med);border-radius:var(--radius);overflow:auto;max-height:calc(100vh - 220px)">
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead style="background:var(--surface2);position:sticky;top:0;z-index:2">
        <tr>
          <th style="padding:8px 12px;text-align:left;border-bottom:0.5px solid var(--border-med);font-size:10.5px;text-transform:uppercase;color:var(--text-hint);font-weight:500">Операция</th>
          <th style="padding:8px 12px;width:130px;text-align:center;border-bottom:0.5px solid var(--border-med);font-size:10.5px;text-transform:uppercase;color:var(--text-hint);font-weight:500">Старт План</th>
          <th style="padding:8px 12px;width:80px;text-align:center;border-bottom:0.5px solid var(--border-med);font-size:10.5px;text-transform:uppercase;color:var(--text-hint);font-weight:500">Дней</th>
          <th style="padding:8px 12px;width:130px;text-align:center;border-bottom:0.5px solid var(--border-med);font-size:10.5px;text-transform:uppercase;color:var(--text-hint);font-weight:500">Конец План</th>
          <th style="padding:8px 12px;width:50px;border-bottom:0.5px solid var(--border-med)"></th>
        </tr>
      </thead>
      <tbody>`;

  groups.forEach((group, gi) => {
    const gid = `plan_g_${gi}`;
    const dirtyInGroup = group.rows.filter(r => r.dirty).length;
    const groupLabel = group.name || '(без группы)';
    const isCollapsed = planState.collapsed && planState.collapsed[groupLabel];
    const chevron = isCollapsed ? '▶' : '▼';

    // Заголовок группы — клик сворачивает/разворачивает
    html += `<tr class="plan-group-header" data-group-name="${esc(groupLabel)}" onclick="togglePlanGroup('${esc(groupLabel).replace(/'/g,"\\'")}')" style="cursor:pointer">
      <td colspan="5" style="background:#f0f0ef;padding:9px 12px;font-weight:600;font-size:12.5px;color:var(--text);border-top:1px solid var(--border-med);border-bottom:0.5px solid var(--border-med);user-select:none">
        <span style="display:inline-block;width:14px;color:var(--text-hint);font-size:10px;margin-right:4px">${chevron}</span>${esc(displayPost(groupLabel))}
        <span style="font-size:11px;color:var(--text-hint);margin-left:8px;font-weight:400">${group.rows.length} оп.</span>
        ${dirtyInGroup ? `<span style="font-size:11px;color:#f59e0b;margin-left:8px;font-weight:500">● ${dirtyInGroup} изм.</span>` : ''}
      </td>
    </tr>`;

    if (isCollapsed) return;

    group.rows.forEach(r => {
      const i = r._idx;
      const dirtyMark = r.dirty ? '<span style="color:#f59e0b;margin-right:4px">●</span>' : '';
      const isoStart = rusToIso(r.startPlan);
      const isoEnd   = rusToIso(r.endPlan);

      html += `<tr data-plan-row="${i}" style="border-bottom:0.5px solid var(--border)">
        <td style="padding:7px 12px;padding-left:32px">${dirtyMark}${esc(r.label)}</td>
        <td style="padding:5px 8px;text-align:center">
          <input type="date" data-fld="start" value="${isoStart}" onchange="onPlanChange(${i},'start',isoToRus(this.value))"
                 style="width:100%;padding:5px 8px;border:0.5px solid var(--border-med);border-radius:4px;font-size:12px;text-align:center;font-family:inherit">
        </td>
        <td style="padding:5px 8px;text-align:center">
          <input type="number" data-fld="duration" min="0" value="${r.duration ?? ''}" onchange="onPlanChange(${i},'duration',this.value)"
                 style="width:100%;padding:5px 8px;border:0.5px solid var(--border-med);border-radius:4px;font-size:12px;text-align:center;font-family:inherit">
        </td>
        <td style="padding:5px 8px;text-align:center">
          <input type="date" data-fld="end" value="${isoEnd}" onchange="onPlanChange(${i},'end',isoToRus(this.value))"
                 style="width:100%;padding:5px 8px;border:0.5px solid var(--border-med);border-radius:4px;font-size:12px;text-align:center;font-family:inherit">
        </td>
        <td style="padding:5px 8px;text-align:center">
          <button onclick="planFromPrev(${i})" title="Старт = конец предыдущей"
                  style="padding:4px 6px;background:transparent;border:0.5px solid var(--border-med);border-radius:4px;cursor:pointer;font-size:11px">↩</button>
        </td>
      </tr>`;
    });
  });

  html += `</tbody></table></div>`;
  wrap.innerHTML = html;
}

function togglePlanGroup(name) {
  if (!planState.collapsed) planState.collapsed = {};
  planState.collapsed[name] = !planState.collapsed[name];
  renderPlanTable();
}

function onPlanChange(idx, field, value) {
  const r = planState.rows[idx];
  if (!r) return;

  if (field === 'start') {
    r.startPlan = value.trim();
    // Если задана длительность — пересчитаем конец
    if (r.duration !== null && r.duration !== '' && parsePlanDate(r.startPlan)) {
      const d = parsePlanDate(r.startPlan);
      d.setDate(d.getDate() + Number(r.duration));
      r.endPlan = fmtPlanDate(d);
    } else {
      r.duration = calcDuration(r.startPlan, r.endPlan);
    }
  } else if (field === 'end') {
    r.endPlan = value.trim();
    r.duration = calcDuration(r.startPlan, r.endPlan);
  } else if (field === 'duration') {
    r.duration = value === '' ? null : Number(value);
    if (r.duration !== null && parsePlanDate(r.startPlan)) {
      const d = parsePlanDate(r.startPlan);
      d.setDate(d.getDate() + r.duration);
      r.endPlan = fmtPlanDate(d);
    }
  }

  r.dirty = (r.startPlan !== r.origStart || r.endPlan !== r.origEnd);
  r.changedStart = (r.startPlan !== r.origStart);
  r.changedEnd   = (r.endPlan   !== r.origEnd);

  // Точечно обновляем только инпуты этой строки
  updatePlanRowInputs(idx);
  updatePlanDirtyInfo();
}

function updatePlanRowInputs(idx) {
  const r = planState.rows[idx];
  if (!r) return;
  const tr = document.querySelector(`tr[data-plan-row="${idx}"]`);
  if (!tr) return;

  const startInput = tr.querySelector('input[data-fld="start"]');
  const endInput   = tr.querySelector('input[data-fld="end"]');
  const durInput   = tr.querySelector('input[data-fld="duration"]');

  if (startInput && document.activeElement !== startInput) startInput.value = rusToIso(r.startPlan);
  if (endInput   && document.activeElement !== endInput)   endInput.value   = rusToIso(r.endPlan);
  if (durInput   && document.activeElement !== durInput)   durInput.value   = r.duration ?? '';

  const labelCell = tr.querySelector('td:first-child');
  if (labelCell) {
    const has = labelCell.querySelector('.plan-dirty-dot');
    if (r.dirty && !has) {
      const dot = document.createElement('span');
      dot.className = 'plan-dirty-dot';
      dot.style.cssText = 'color:#f59e0b;margin-right:4px';
      dot.textContent = '●';
      labelCell.insertBefore(dot, labelCell.firstChild);
    } else if (!r.dirty && has) {
      has.remove();
    }
  }
}

function planFromPrev(idx) {
  if (idx === 0) return;
  const prev = planState.rows[idx - 1];
  if (!prev.endPlan) {
    alert('У предыдущей операции не задан конец плана');
    return;
  }
  onPlanChange(idx, 'start', prev.endPlan);
}

function updatePlanDirtyInfo() {
  const dirty = planState.rows.filter(r => r.dirty).length;
  const el = document.getElementById('plan-dirty-info');
  if (el) el.textContent = dirty > 0 ? `Изменено: ${dirty} оп.` : 'Изменений нет';
  const btn = document.getElementById('plan-save');
  if (btn) btn.disabled = dirty === 0;
}

async function savePlan() {
  const dirty = planState.rows.filter(r => r.dirty);
  if (!dirty.length) {
    alert('Нет изменений');
    return;
  }

  const sheets = PLAN_AREAS[planState.area];
  const sheet  = sheets[planState.proj];

  // Проверка — у нас должны быть rowNum
  const missingRow = dirty.find(r => !r.rowNum);
  if (missingRow) {
    alert('Внимание: фронт не получил sourceRow от бэка.\nНужно обновить utils.gs (см. инструкцию).\n\nОперация без rowNum: ' + missingRow.label);
    return;
  }

  // Проверка конфликтов
  document.getElementById('plan-save').textContent = 'Проверка...';
  document.getElementById('plan-save').disabled = true;
  let conflictCheck;
  try {
    conflictCheck = await checkConflicts(sheet, dirty, 'plan', planState.unit);
  } catch(e) {
    document.getElementById('plan-save').textContent = 'Сохранить план';
    document.getElementById('plan-save').disabled = false;
    alert('Не удалось проверить конфликты: ' + e.message);
    return;
  }

  if (conflictCheck.conflicts.length) {
    const ok = confirm(
      `⚠ В Google Sheets уже изменили ${conflictCheck.conflicts.length} из ваших ${dirty.length} операций ` +
      `(возможно, кто-то правил в таблице):\n\n` +
      describeConflicts(conflictCheck.conflicts) +
      `\n\n— OK → перезаписать своими значениями\n— Отмена → отменить сохранение и обновить данные`
    );
    if (!ok) {
      document.getElementById('plan-save').textContent = 'Сохранить план';
      document.getElementById('plan-save').disabled = false;
      delete detailCache[sheet];
      loadPlanRows();
      return;
    }
  }

  const updates = dirty.map(r => ({
    row: r.rowNum,
    startPlan: r.startPlan || '',
    endPlan:   r.endPlan   || '',
  }));

  document.getElementById('plan-save').textContent = 'Сохраняем...';

  try {
    const r = await fetch(GAS, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'savePlan',
        sheet,
        unit: planState.unit,
        updates,
      }),
    });
    const result = await r.json();

    if (result.error) {
      alert('Ошибка: ' + result.error);
    } else {
      alert(`✓ Сохранено ${result.written} ячеек`);
      // Обновим оригиналы и сбросим dirty
      dirty.forEach(r => {
        r.origStart = r.startPlan;
        r.origEnd   = r.endPlan;
        r.changedStart = false;
        r.changedEnd   = false;
        r.dirty = false;
      });
      // Не сбрасываем кэш сводки/ганта — помечаем устаревшим (точка на «Обновить»)
      markStale();
      renderPlanTable();
      updatePlanDirtyInfo();
    }
  } catch(e) {
    alert('Сетевая ошибка: ' + e.message);
  } finally {
    document.getElementById('plan-save').textContent = 'Сохранить план';
    document.getElementById('plan-save').disabled = false;
  }
}

async function loadFactRows() {
  const sheets = PLAN_AREAS[factState.area]; // переиспользуем тот же маппинг
  const sheet  = sheets && sheets[factState.proj];
  const wrap   = document.getElementById('fact-table-wrap');

  if (!sheet) {
    wrap.innerHTML = `<div class="state-msg">Для ${factState.proj.toUpperCase()} нет листа на участке "${factState.area}"</div>`;
    factState.rows = [];
    updateFactDirtyInfo();
    return;
  }

  wrap.innerHTML = `<div class="big-loading"><span class="loader"></span><div class="big-loading-text">Загружаем ${sheet}</div></div>`;
  let detail;
  try {
    const r = await fetch(GAS + '?action=detail&sheet=' + encodeURIComponent(sheet) + '&_=' + Date.now());
    detail = await r.json();
    detailCache[sheet] = detail;
  } catch(e) {
    wrap.innerHTML = `<div class="state-msg">Ошибка загрузки: ${e.message}</div>`;
    return;
  }

  if (!detail.hasStartEnd) {
    wrap.innerHTML = `<div class="state-msg">Лист "${sheet}" не поддерживает старт/конец факта</div>`;
    factState.rows = [];
    updateFactDirtyInfo();
    return;
  }

  const indicator = document.getElementById('fact-current-sheet');
  if (indicator) indicator.textContent = `📋 ${sheet} · ${detail.rows.length} оп.`;

  factState.rows = detail.rows.map((r, idx) => {
    const d = (r.dates && r.dates[factState.unit]) || {};
    return {
      idx,
      rowNum: r.sourceRow || null,
      label: r.label || '',
      group: r.group || '',
      post:  r.post  || '',
      flat:  r.flat,
      startPlan: d.startPlan || '',  // показываем как подсказку
      endPlan:   d.endPlan   || '',
      startFact: d.startFact || '',
      endFact:   d.endFact   || '',
      duration:  calcDuration(d.startFact, d.endFact),
      origStart: d.startFact || '',
      origEnd:   d.endFact   || '',
      dirty: false,
    };
  });

  renderFactTable();
  updateFactDirtyInfo();
}

function renderFactTable() {

function updateFactRowInputs(idx) {
  const r = factState.rows[idx];
  if (!r) return;
  const tr = document.querySelector(`tr[data-fact-row="${idx}"]`);
  if (!tr) return;

  const startInput = tr.querySelector('input[data-fld="start"]');
  const endInput   = tr.querySelector('input[data-fld="end"]');
  const durInput   = tr.querySelector('input[data-fld="duration"]');

  if (startInput && document.activeElement !== startInput) startInput.value = rusToIso(r.startFact);
  if (endInput   && document.activeElement !== endInput)   endInput.value   = rusToIso(r.endFact);
  if (durInput   && document.activeElement !== durInput)   durInput.value   = r.duration ?? '';

  const labelCell = tr.querySelector('td:first-child');
  if (labelCell) {
    const has = labelCell.querySelector('.fact-dirty-dot');
    if (r.dirty && !has) {
      const dot = document.createElement('span');
      dot.className = 'fact-dirty-dot';
      dot.style.cssText = 'color:#f59e0b;margin-right:4px';
      dot.textContent = '●';
      labelCell.insertBefore(dot, labelCell.firstChild);
    } else if (!r.dirty && has) {
      has.remove();
    }
  }
}

function factFromPrev(idx) {
  if (idx === 0) return;
  const prev = factState.rows[idx - 1];
  if (!prev.endFact) {
    alert('У предыдущей операции не задан конец факта');
    return;
  }
  onFactChange(idx, 'start', prev.endFact);
}

function updateFactDirtyInfo() {
  const dirty = factState.rows.filter(r => r.dirty).length;
  const el = document.getElementById('fact-dirty-info');
  if (el) el.textContent = dirty > 0 ? `Изменено: ${dirty} оп.` : 'Изменений нет';
  const btn = document.getElementById('fact-save');
  if (btn) btn.disabled = dirty === 0;
}

// ─────────────────────────────────────────────────────────────
// Проверка конфликтов перед записью.
// Перечитывает свежие данные из листа и сравнивает с origStart/origEnd,
// которые мы зафиксировали при загрузке страницы.
// Возвращает: { conflicts: [...], freshDetail }
// conflicts — массив { row, label, kind, mine, theirs } для строк где
//   в Sheets что-то поменялось с момента загрузки, причём именно в тех
//   полях, которые мы собираемся писать (dirty).
// kind: 'startPlan' | 'endPlan' | 'startFact' | 'endFact'
// ─────────────────────────────────────────────────────────────
async function checkConflicts(sheet, dirty, mode, unit) {
  const r = await fetch(GAS + '?action=detail&sheet=' + encodeURIComponent(sheet) + '&_=' + Date.now());
  const fresh = await r.json();
  const conflicts = [];
  const startField = mode === 'fact' ? 'startFact' : 'startPlan';
  const endField   = mode === 'fact' ? 'endFact'   : 'endPlan';

  dirty.forEach(row => {
    // Найдём ту же строку в свежих данных
    const freshRow = (fresh.rows || []).find(fr => fr.sourceRow === row.rowNum);
    if (!freshRow) return;
    const freshDates = (freshRow.dates && freshRow.dates[unit]) || {};
    // Проверяем — изменилось ли значение, которое было при загрузке
    if (row.changedStart && (freshDates[startField] || '') !== (row.origStart || '')) {
      conflicts.push({
        row: row.rowNum, label: row.label, kind: startField,
        mine: row[startField] || '(пусто)',
        theirs: freshDates[startField] || '(пусто)',
        original: row.origStart || '(пусто)',
      });
    }
    if (row.changedEnd && (freshDates[endField] || '') !== (row.origEnd || '')) {
      conflicts.push({
        row: row.rowNum, label: row.label, kind: endField,
        mine: row[endField] || '(пусто)',
        theirs: freshDates[endField] || '(пусто)',
        original: row.origEnd || '(пусто)',
      });
    }
  });

  return { conflicts, fresh };
}

function describeConflicts(conflicts) {
  const fieldNames = {
    startPlan: 'старт плана', endPlan: 'конец плана',
    startFact: 'старт факта', endFact: 'конец факта'
  };
  return conflicts.slice(0, 5).map(c =>
    `• "${c.label}" — ${fieldNames[c.kind]}:\n` +
    `   было: ${c.original}\n` +
    `   в Sheets уже: ${c.theirs}\n` +
    `   твоё: ${c.mine}`
  ).join('\n\n') + (conflicts.length > 5 ? `\n\n…и ещё ${conflicts.length - 5}` : '');
}

async function saveFact() {
  const dirty = factState.rows.filter(r => r.dirty);
  if (!dirty.length) {
    alert('Нет изменений');
    return;
  }

  const sheets = PLAN_AREAS[factState.area];
  const sheet  = sheets[factState.proj];

  const missingRow = dirty.find(r => !r.rowNum);
  if (missingRow) {
    alert('Ошибка: фронт не получил sourceRow от бэка. Обновите utils.gs в GAS.\nОперация без rowNum: ' + missingRow.label);
    return;
  }

  // Сначала проверяем конфликты
  document.getElementById('fact-save').textContent = 'Проверка...';
  document.getElementById('fact-save').disabled = true;
  let conflictCheck;
  try {
    conflictCheck = await checkConflicts(sheet, dirty, 'fact', factState.unit);
  } catch(e) {
    document.getElementById('fact-save').textContent = 'Сохранить факт';
    document.getElementById('fact-save').disabled = false;
    alert('Не удалось проверить конфликты: ' + e.message);
    return;
  }

  if (conflictCheck.conflicts.length) {
    const ok = confirm(
      `⚠ В Google Sheets уже изменили ${conflictCheck.conflicts.length} из ваших ${dirty.length} операций ` +
      `(возможно, кто-то правил в таблице):\n\n` +
      describeConflicts(conflictCheck.conflicts) +
      `\n\n— OK → перезаписать своими значениями\n— Отмена → отменить сохранение и обновить данные`
    );
    if (!ok) {
      document.getElementById('fact-save').textContent = 'Сохранить факт';
      document.getElementById('fact-save').disabled = false;
      // Освежим страницу — пусть мастер увидит реальное состояние
      delete detailCache[sheet];
      loadFactRows();
      return;
    }
  }

  const updates = dirty.map(r => ({
    row: r.rowNum,
    startFact: r.startFact || '',
    endFact:   r.endFact   || '',
  }));

  document.getElementById('fact-save').textContent = 'Сохраняем...';

  try {
    const r = await fetch(GAS, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'saveFact',
        sheet,
        unit: factState.unit,
        updates,
      }),
    });
    const result = await r.json();

    if (result.error) {
      alert('Ошибка: ' + result.error);
    } else {
      alert(`✓ Сохранено ${result.written} ячеек`);
      dirty.forEach(r => {
        r.origStart = r.startFact;
        r.origEnd   = r.endFact;
        r.changedStart = false;
        r.changedEnd   = false;
        r.dirty = false;
      });
      markStale();
      renderFactTable();
      updateFactDirtyInfo();
    }
  } catch(e) {
    alert('Сетевая ошибка: ' + e.message);
  } finally {
    document.getElementById('fact-save').textContent = 'Сохранить факт';
    document.getElementById('fact-save').disabled = false;
  }
}
</script>
